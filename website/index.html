    <!-- Eclipse Foundation Cookie Consent Banner -->
    <link
      rel="stylesheet"
      type="text/css"
      href="//www.eclipse.org/eclipse.org-common/themes/solstice/public/stylesheets/vendor/cookieconsent/cookieconsent.min.css"
    />
    <script src="//www.eclipse.org/eclipse.org-common/themes/solstice/public/javascript/vendor/cookieconsent/default.min.js"></script>
    <!-- Google Tag Manager (consent-aware) -->
    <script>
      (function () {
        var gtmLoaded = false;
        function loadGTM() {
          if (gtmLoaded) return;
          gtmLoaded = true;
          (function (w, d, s, l, i) {
            w[l] = w[l] || [];
            w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
            var f = d.getElementsByTagName(s)[0],
              j = d.createElement(s),
              dl = l != "dataLayer" ? "&l=" + l : "";
            j.async = true;
            j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
            f.parentNode.insertBefore(j, f);
          })(window, document, "script", "dataLayer", "GTM-5WLCZXC");
        }
        function hasConsent() {
          return (
            document.cookie.indexOf("eclipse_cookieconsent_status=allow") > -1
          );
        }
        if (hasConsent()) {
          loadGTM();
        }
        document.addEventListener("click", function (e) {
          if (e.target.closest(".cc-allow")) {
            setTimeout(function () {
              if (hasConsent()) loadGTM();
            }, 100);
          }
        });
      })();
    </script>
    <!-- End Google Tag Manager -->
    <!-- GitHub Pages SPA redirect restore -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, "", redirect);
        }
      })();
    </script>

    <noscript>

    </noscript>
    <!-- End Google Tag Manager (noscript) -->

  </body>

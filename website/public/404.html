<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AI Registry</title>
    <script>
      // GitHub Pages SPA redirect
      // Stores the current path in sessionStorage and redirects to index.html
      // The restore script in index.html picks it up via history.replaceState
      sessionStorage.redirect = location.href;
      location.replace(
        location.pathname.split("/").slice(0, 2).join("/") + "/",
      );
    </script>
  </head>
  <body></body>
</html>
